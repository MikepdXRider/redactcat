name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-test-secret-not-used-in-production
      S3_BUCKET: ci-test-bucket-not-used-in-production
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get install -y libzbar0
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run mypy app
      - run: uv run pytest
